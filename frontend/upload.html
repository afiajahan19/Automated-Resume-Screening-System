<h1>Upload Resume</h1>

<form id="uploadForm">

<label>Job Description</label>

<textarea
id="jobDescription"
rows="8"
placeholder="Paste Job Description here..."
></textarea>

<br><br>

<label>Select Resume (PDF)</label>

<input
type="file"
id="resume"
accept=".pdf"
>

Upload Resume
</button>

</form>
